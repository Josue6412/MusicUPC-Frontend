<h2 mat-dialog-title class="mu-title">
  Recortar imagen
</h2>

<mat-dialog-content class="crop-content">

  <image-cropper
    [imageChangedEvent]="imageChangedEvent"
    [maintainAspectRatio]="true"
    [aspectRatio]="1 / 1"
    [resizeToWidth]="500"
    [cropperMinWidth]="180"
    [roundCropper]="true"
    format="jpeg"
    output="blob"
    (imageCropped)="imageCropped($event)"
  >
  </image-cropper>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button
    mat-button
    (click)="cancel()">

    Cancelar

  </button>

  <button
    mat-flat-button
    color="primary"
    (click)="aceptar()">

    Aceptar

  </button>

</mat-dialog-actions>
